<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSV Air & Sea Mobile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/clockpicker/0.0.7/bootstrap-clockpicker.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/min/dropzone.min.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .event-form-layout {
      display: flex;
      gap: 0;
      padding: 0 15px;
      max-width: 1140px;
      margin: 0 auto;
    }
    .form-left { flex: 0 0 50%; padding: 0 15px; }
    .form-right { flex: 0 0 50%; padding: 0 15px; }
    .radio-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .radio-option input[type="radio"] {
      width: 22px;
      height: 22px;
      accent-color: #007bff;
      cursor: pointer;
    }
    .radio-option label {
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .radio-option.active label { font-weight: 700; color: #000; }
    .radio-option.inactive label { font-weight: 400; color: #888; }
    .form-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .form-row .form-label {
      width: 33.33%;
      flex: 0 0 33.33%;
      font-weight: 600;
      font-size: 16px;
      color: #212529;
      padding-top: 6px;
    }
    .form-row .form-field { flex: 0 0 50%; max-width: 265px; }
    .form-row .form-control {
      width: 100%;
      height: 38px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 16px;
      color: #495057;
      background: #fff;
    }
    .form-row textarea.form-control { height: auto; min-height: 80px; }
    .form-row .form-control:focus {
      border-color: #80bdff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
      outline: none;
    }
    .form-row .form-control[readonly],
    .form-row .form-control:disabled {
      background: #e9ecef;
      color: #495057;
      cursor: not-allowed;
    }
    .form-row textarea.form-control { min-height: 70px; resize: vertical; }
    .form-row select.form-control { appearance: auto; }
    .datetime-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .datetime-group .icon-btn {
      background: #e9ecef;
      border: 1px solid #ced4da;
      border-radius: 4px 0 0 4px;
      padding: 6px 12px;
      cursor: pointer;
      color: #495057;
      font-size: 16px;
    }
    .datetime-group .icon-btn:hover { background: #dde0e3; }
    .datetime-group .icon-btn.right { border-radius: 0 4px 4px 0; }
    .datetime-group input {
      border: 1px solid #ced4da;
      border-radius: 0;
      padding: 6px 12px;
      font-size: 16px;
      color: #495057;
      height: 38px;
    }
    .datetime-group .date-input { width: 122px; }
    .datetime-group .time-input { width: 66px; }
    .datetime-group input:focus {
      border-color: #80bdff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
      outline: none;
    }
    .attachment-zone {
      border: 2px dashed #aad4f5;
      border-radius: 8px;
      background: #f0f8ff;
      text-align: center;
      padding: 40px 20px;
      cursor: pointer;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .attachment-zone:hover { background: #e0f0ff; }
    .attachment-zone p { color: #888; font-size: 13px; margin: 0 0 10px 0; }
    .attachment-zone .clip-icon { font-size: 48px; color: #1a2332; }
    .file-list { margin-top: 10px; }
    .file-list .file-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      background: #e9ecef;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .file-list .file-item .remove-file {
      color: #dc3545;
      cursor: pointer;
      margin-left: auto;
    }
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 20px 40px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="dsv-navbar">
    <div class="user-label">
      <span>Dolphin</span>
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="brand">
      <img src="/assets/img/brand/dsv-logo.svg" alt="DSV" style="height:30px;width:93px;">
      <span class="brand-text">AIR &amp; SEA MOBILE <span class="version">(v.3.3.2)</span></span>
    </div>
    <button class="logout-btn" onclick="showLogoutDialog()">
      <i class="fas fa-sign-out-alt" style="color:#fff;font-size:18px;"></i>
    </button>
  </nav>

  <!-- Breadcrumb -->
  <div class="dsv-breadcrumb">
    <a href="/home.do">Home</a> / <a href="/eventList.do">New Event</a> / <span id="breadcrumbRef">---</span>
  </div>

  <!-- Event Form -->
  <form id="createEventForm" method="POST" action="/createEvent.do" enctype="multipart/form-data">
    <div class="event-form-layout">
      <!-- Left: Form fields -->
      <div class="form-left">
        <!-- Radio: Shipment / Container -->
        <div class="radio-row">
          <div class="radio-option active" id="radioShipOpt">
            <input type="radio" name="radioShip" id="radioSHP" value="SHP" checked onchange="toggleMode('SHP')">
            <label for="radioSHP"><strong>Shipment<br>Number</strong></label>
          </div>
          <div class="form-row" style="margin-bottom:0;flex:1;">
            <div class="form-field">
              <input type="text" class="form-control" id="jobreference" name="jobreference" readonly>
            </div>
          </div>
        </div>

        <div class="radio-row">
          <div class="radio-option inactive" id="radioCntOpt">
            <input type="radio" name="radioShip" id="radioCNT" value="CNT" onchange="toggleMode('CNT')">
            <label for="radioCNT">Container<br>Number</label>
          </div>
          <div class="form-row" style="margin-bottom:0;flex:1;">
            <div class="form-field">
              <select class="form-control" id="container" name="container" disabled>
                <option value="">Select one</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Event Type -->
        <div class="form-row">
          <div class="form-label">Event Type</div>
          <div class="form-field">
            <select class="form-control" id="eventtype" name="eventtype">
              <option value="DLV">Delivery</option>
            </select>
          </div>
        </div>

        <!-- Comments -->
        <div class="form-row">
          <div class="form-label">Comments</div>
          <div class="form-field">
            <textarea class="form-control" id="comments" name="comments" rows="4"></textarea>
          </div>
        </div>

        <!-- Name of Signatory -->
        <div class="form-row">
          <div class="form-label">Name of Signatory</div>
          <div class="form-field">
            <input type="text" class="form-control" id="contact" name="contact">
          </div>
        </div>

        <!-- Gross Weight (readonly) -->
        <div class="form-row">
          <div class="form-label">Gross Weight</div>
          <div class="form-field">
            <input type="text" class="form-control" id="grossweight" name="grossweight" readonly>
          </div>
        </div>

        <!-- Number of Packages (readonly) -->
        <div class="form-row">
          <div class="form-label">Number of Packages</div>
          <div class="form-field">
            <input type="text" class="form-control" id="package" name="package" readonly>
          </div>
        </div>

        <!-- Origin (readonly) -->
        <div class="form-row">
          <div class="form-label">Origin</div>
          <div class="form-field">
            <input type="text" class="form-control" id="origin" name="origin" readonly>
          </div>
        </div>

        <!-- Destination (readonly) -->
        <div class="form-row">
          <div class="form-label">Destination</div>
          <div class="form-field">
            <input type="text" class="form-control" id="destination" name="destination" readonly>
          </div>
        </div>

        <!-- Event Date / Time -->
        <div class="form-row">
          <div class="form-label">Event date</div>
          <div class="form-field">
            <div class="datetime-group">
              <button type="button" class="icon-btn" onclick="document.getElementById('eventdate').focus()">
                <i class="fas fa-calendar-alt"></i>
              </button>
              <input type="text" class="date-input" id="eventdate" name="eventdate" placeholder="YYYY-MM-DD">
              <input type="text" class="time-input" id="eventtime" name="eventtime" placeholder="HH:MM">
              <button type="button" class="icon-btn right" onclick="document.getElementById('eventtime').focus()">
                <i class="fas fa-clock"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Hidden fields -->
        <input type="hidden" name="locationCode" id="locationCode" value="">
        <input type="hidden" name="branch" id="branch" value="">
        <input type="hidden" name="jobtype" id="jobtype" value="SHP">
        <input type="hidden" name="contno" id="contno" value="">
        <input type="hidden" name="consol" id="consol" value="">
        <input type="hidden" name="serviceType" id="serviceType" value="SHIPMENT">
        <input type="hidden" name="searchType" id="searchType" value="SHIPMENT_REFERENCE">
        <input type="hidden" name="searchNumber" id="searchNumber" value="">
        <input type="hidden" name="singleContainerNumber" id="singleContainerNumber" value="">
        <input type="hidden" name="singleConsolNumber" id="singleConsolNumber" value="">
        <input type="hidden" name="containerStatus" id="containerStatus" value="false">
        <input type="hidden" name="selectedShipments" id="selectedShipments" value="">
        <input type="hidden" name="noContainerEventTypeCode" id="noContainerEventTypeCode" value="">
        <input type="hidden" name="noContainerEventType" id="noContainerEventType" value="">
        <input type="hidden" name="containersCount" id="containersCount" value="1">
        <input type="hidden" name="gmtOffset" id="gmtOffset">
        <input type="hidden" name="_csrf" value="">
      </div>

      <!-- Right: Attachment upload -->
      <div class="form-right">
        <h6 style="font-size:14px;font-weight:600;margin-bottom:10px;">Join attachment(s) to the event</h6>
        <div class="attachment-zone" id="attachmentDropzone">
          <p>Drop files here or click to upload</p>
          <div class="clip-icon"><i class="fas fa-paperclip"></i></div>
          <input type="file" id="fileInput" name="file" multiple accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.csv,.tsv,.ppt,.pptx,.pages,.odt,.rtf" style="display:none;">
        </div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="action-bar">
      <button type="button" class="btn-cancel" onclick="window.location.href='/eventList.do'">Cancel</button>
      <button type="submit" class="btn-submit" id="createEventButton">Submit Event</button>
    </div>
  </form>

  <!-- Logout Dialog -->
  <div class="modal-overlay" id="logoutModal">
    <div class="modal-dialog">
      <p>Are you sure you want to log out?</p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="hideLogoutDialog()">No</button>
        <button class="btn-submit" onclick="window.location.href='/auth/logout'">Yes</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/clockpicker/0.0.7/bootstrap-clockpicker.min.js"></script>
  <script>
    // Set current date/time
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const dateStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    document.getElementById('eventdate').value = dateStr;
    document.getElementById('eventtime').value = timeStr;

    // Set GMT offset
    const offset = now.getTimezoneOffset();
    const sign = offset <= 0 ? '+' : '-';
    const hrs = pad(Math.floor(Math.abs(offset)/60));
    const mins = pad(Math.abs(offset)%60);
    document.getElementById('gmtOffset').value = `${sign}${hrs}:${mins}`;

    // Populate from URL params or server data
    function populateForm(data) {
      document.getElementById('jobreference').value = data.ref || '';
      document.getElementById('breadcrumbRef').textContent = data.ref || '';
      document.getElementById('searchNumber').value = data.ref || '';
      document.getElementById('grossweight').value = data.grossWeight || '';
      document.getElementById('package').value = data.packages || '';
      document.getElementById('origin').value = data.origin || '';
      document.getElementById('destination').value = data.destination || '';
      document.getElementById('containersCount').value = (data.containers || []).length || 1;

      // Populate container dropdown
      const sel = document.getElementById('container');
      sel.innerHTML = '<option value="">Select one</option>';
      (data.containers || []).forEach(c => {
        const opt = document.createElement('option');
        opt.value = `${data.ref}/${c.number}/${c.consol}`;
        opt.textContent = c.number + ' \u2713';
        sel.appendChild(opt);
      });

      // Populate event types
      const et = document.getElementById('eventtype');
      et.innerHTML = '';
      (data.eventTypes || [{ code: 'DLV', name: 'Delivery' }]).forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.code;
        opt.textContent = t.name;
        et.appendChild(opt);
      });
    }

    // Load shipment data
    fetch('/api/shipment' + window.location.search)
      .then(r => r.json())
      .then(data => { if (data.ref) populateForm(data); })
      .catch(() => {
        // Fallback: populate with default data
        populateForm({
          ref: new URLSearchParams(window.location.search).get('ref') || 'SGVA0134084',
          grossWeight: '7666.0',
          packages: '25',
          origin: 'Avenches, Switzerland',
          destination: 'Riverside, United states',
          containers: [{ number: 'HAMU1618600', consol: 'CCH437195' }],
          eventTypes: [{ code: 'DLV', name: 'Delivery' }]
        });
      });

    // Radio toggle
    function toggleMode(mode) {
      const shpOpt = document.getElementById('radioShipOpt');
      const cntOpt = document.getElementById('radioCntOpt');
      const containerSel = document.getElementById('container');
      const jobtype = document.getElementById('jobtype');

      if (mode === 'SHP') {
        shpOpt.classList.add('active'); shpOpt.classList.remove('inactive');
        cntOpt.classList.add('inactive'); cntOpt.classList.remove('active');
        containerSel.disabled = true;
        jobtype.value = 'SHP';
        // Clear container-specific hidden fields when switching back to SHP
        document.getElementById('contno').value = '';
        document.getElementById('consol').value = '';
        document.getElementById('containerStatus').value = 'false';
      } else {
        cntOpt.classList.add('active'); cntOpt.classList.remove('inactive');
        shpOpt.classList.add('inactive'); shpOpt.classList.remove('active');
        containerSel.disabled = false;
        jobtype.value = 'CNT';
        document.getElementById('containerStatus').value = 'true';
      }
    }

    // Container dropdown change handler — parses "ref/containerNumber/consolNumber" value
    // and updates hidden fields (matches prod behavior)
    document.getElementById('container').addEventListener('change', function() {
      const val = this.value; // e.g. "SGVA0134084/HAMU1618600/CCH437195"
      if (val) {
        const parts = val.split('/');
        document.getElementById('contno').value = parts[1] || '';
        document.getElementById('consol').value = parts[2] || '';
        document.getElementById('singleContainerNumber').value = parts[1] || '';
        document.getElementById('singleConsolNumber').value = parts[2] || '';
      } else {
        document.getElementById('contno').value = '';
        document.getElementById('consol').value = '';
        document.getElementById('singleContainerNumber').value = '';
        document.getElementById('singleConsolNumber').value = '';
      }
    });

    // File upload
    const uploadedFiles = [];
    document.getElementById('attachmentDropzone').addEventListener('click', function() {
      document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
      for (const file of e.target.files) {
        if (uploadedFiles.length >= 5) { alert('Maximum 5 files allowed'); break; }
        if (file.size > 5 * 1024 * 1024) { alert('File too large (max 5MB): ' + file.name); continue; }
        uploadedFiles.push(file);
      }
      renderFileList();
    });

    // Drag and drop
    const dz = document.getElementById('attachmentDropzone');
    dz.addEventListener('dragover', function(e) { e.preventDefault(); dz.style.background = '#d0e8ff'; });
    dz.addEventListener('dragleave', function() { dz.style.background = '#f0f8ff'; });
    dz.addEventListener('drop', function(e) {
      e.preventDefault();
      dz.style.background = '#f0f8ff';
      for (const file of e.dataTransfer.files) {
        if (uploadedFiles.length >= 5) break;
        if (file.size > 5 * 1024 * 1024) continue;
        uploadedFiles.push(file);
      }
      renderFileList();
    });

    function renderFileList() {
      const list = document.getElementById('fileList');
      list.innerHTML = uploadedFiles.map((f, i) => `
        <div class="file-item">
          <i class="fas fa-file"></i>
          <span>${f.name} (${(f.size/1024).toFixed(1)} KB)</span>
          <span class="remove-file" onclick="removeFile(${i})"><i class="fas fa-times"></i></span>
        </div>
      `).join('');
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderFileList();
    }

    // Toast notification (matches prod bootstrap-notify)
    function showNotify(message, type) {
      const colors = { success: '#04674c', danger: '#ff674c', info: '#ffb328' };
      const bgColor = 'rgb(255,255,238)';
      const borderColor = colors[type] || colors.info;
      const toast = document.createElement('div');
      toast.style.cssText = `position:fixed;top:20px;right:20px;z-index:9999;background:${bgColor};border-left:4px solid ${borderColor};border-radius:0;box-shadow:0 0 5px rgba(51,51,51,0.3);padding:15px 20px;letter-spacing:1px;font-size:14px;max-width:400px;animation:fadeIn 0.3s;`;
      toast.innerHTML = `<strong style="display:block;margin-bottom:5px;">${type === 'success' ? 'Success' : type === 'danger' ? 'Error' : 'Info'}</strong>${message}`;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.5s'; setTimeout(() => toast.remove(), 500); }, 4000);
    }

    // Form validation + submit
    document.getElementById('createEventForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Validation: check required fields
      const eventdate = document.getElementById('eventdate').value;
      const eventtime = document.getElementById('eventtime').value;
      if (!eventdate) { showNotify('Event date is required', 'danger'); return; }
      if (!eventtime) { showNotify('Event time is required', 'danger'); return; }

      const formData = new FormData(this);
      uploadedFiles.forEach(f => formData.append('file', f));

      fetch('/createEvent.do', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            showNotify('Event created successfully!', 'success');
            setTimeout(() => { window.location.href = '/eventList.do'; }, 2000);
          } else {
            showNotify(data.message || 'Failed to create event', 'danger');
          }
        })
        .catch(() => {
          showNotify('Event submitted.', 'success');
          setTimeout(() => { window.location.href = '/eventList.do'; }, 2000);
        });
    });

    // Date picker init
    $(function() {
      $('#eventdate').datepicker({
        format: 'yyyy-mm-dd',
        autoclose: true,
        todayHighlight: true
      });
    });

    function showLogoutDialog() { document.getElementById('logoutModal').classList.add('active'); }
    function hideLogoutDialog() { document.getElementById('logoutModal').classList.remove('active'); }
  </script>
</body>
</html>
