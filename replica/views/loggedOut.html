<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSV Air & Sea Mobile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="/assets/css/base.css">
</head>
<body>
  <!-- Navbar (no user, no logout button) -->
  <nav class="dsv-navbar">
    <div class="user-label">
      <i class="fas fa-user-circle"></i>
    </div>
    <div class="brand">
      <img src="/assets/img/brand/dsv-logo.svg" alt="DSV" style="height:30px;width:93px;">
      <span class="brand-text">AIR &amp; SEA MOBILE <span class="version">(v.3.3.2)</span></span>
    </div>
    <button class="logout-btn">
      <i class="fas fa-sign-out-alt" style="color:#fff;font-size:18px;"></i>
    </button>
  </nav>

  <!-- Logged out message -->
  <div style="display:flex;justify-content:center;align-items:center;min-height:60vh;">
    <div style="background:#fff;border:1px solid #dee2e6;border-radius:6px;padding:30px 50px;text-align:center;">
      <h4 style="color:#212529;font-weight:700;margin:0 0 15px 0;">You just logged out.</h4>
      <a href="/" style="color:#28a745;font-size:16px;">Click here to log in again</a>
    </div>
  </div>
</body>
</html>
