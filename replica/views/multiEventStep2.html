<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSV Air & Sea Mobile</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    .step2-layout {
      display: flex;
      gap: 30px;
      padding: 20px 40px;
      max-width: 1500px;
      margin: 0 auto;
    }
    .panel-refs { flex: 0 0 300px; }
    .panel-form { flex: 1; max-width: 500px; }
    .panel-attach { flex: 0 0 400px; }
    .ref-chip {
      background: #e2e6ea;
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 600;
    }
    .form-row {
      display: flex;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .form-row .form-label {
      width: 140px;
      font-weight: 600;
      font-size: 13px;
      color: #333;
      padding-top: 6px;
      flex-shrink: 0;
    }
    .form-row .form-field { flex: 1; }
    .form-row .form-control {
      width: 100%;
      height: 38px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      padding: 6px 12px;
      font-size: 16px;
      color: #495057;
    }
    .form-row textarea.form-control { height: auto; min-height: 80px; }
    .form-row .form-control:focus {
      border-color: #80bdff;
      box-shadow: 0 0 0 2px rgba(0,123,255,0.15);
      outline: none;
    }
    .form-row textarea.form-control { min-height: 70px; resize: vertical; }
    .datetime-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .datetime-group .icon-btn {
      background: #e9ecef;
      border: 1px solid #ced4da;
      border-radius: 4px 0 0 4px;
      padding: 6px 12px;
      cursor: pointer;
      color: #495057;
      font-size: 16px;
    }
    .datetime-group .icon-btn.right { border-radius: 0 4px 4px 0; }
    .datetime-group input {
      border: 1px solid #ced4da;
      border-radius: 0;
      padding: 6px 12px;
      font-size: 16px;
      color: #495057;
      height: 38px;
    }
    .datetime-group .date-input { width: 122px; }
    .datetime-group .time-input { width: 66px; }
    .attachment-zone {
      border: 2px dashed #aad4f5;
      border-radius: 8px;
      background: #f0f8ff;
      text-align: center;
      padding: 40px 20px;
      cursor: pointer;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .attachment-zone:hover { background: #e0f0ff; }
    .attachment-zone p { color: #888; font-size: 13px; margin: 0 0 10px 0; }
    .file-list .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; background: #e9ecef; border-radius: 4px;
      margin-bottom: 4px; font-size: 13px;
    }
    .file-list .file-item .remove-file { color: #dc3545; cursor: pointer; margin-left: auto; }
    .action-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 20px 40px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="dsv-navbar">
    <div class="user-label"><span>Dolphin</span> <i class="fas fa-user-circle"></i></div>
    <div class="brand">
      <img src="/assets/img/brand/dsv-logo.svg" alt="DSV" style="height:30px;width:93px;">
      <span class="brand-text">AIR &amp; SEA MOBILE <span class="version">(v.3.3.2)</span></span>
    </div>
    <button class="logout-btn" onclick="showLogoutDialog()"><i class="fas fa-sign-out-alt" style="color:#fff;font-size:18px;"></i></button>
  </nav>

  <!-- Breadcrumb -->
  <div class="dsv-breadcrumb">
    <a href="/home.do">Home</a>/ <span>Multi Event</span>
  </div>

  <!-- Step indicator -->
  <div style="text-align:center;padding:15px 0;">
    <span class="step-badge"><span class="step-label">Step</span><span class="step-num">2</span></span>
    <span class="step-text">Complete event details</span>
  </div>
  <hr style="margin:0;border-color:#ddd;">

  <!-- Back arrow -->
  <button class="step-arrow step-arrow-left" onclick="window.location.href='/multiEventStep1.do'">
    <i class="fas fa-chevron-left"></i>
  </button>

  <!-- Form -->
  <form id="createMultiEventsForm" method="POST" action="/createMultiEvents.do" enctype="multipart/form-data">
    <div class="step2-layout">
      <!-- Selected references -->
      <div class="panel-refs">
        <h6 style="font-weight:600;margin-bottom:10px;">Selected References ( <span id="refCount">0</span> )</h6>
        <div id="refList"></div>
      </div>

      <!-- Event details form -->
      <div class="panel-form">
        <div class="form-row">
          <div class="form-label">Event Type</div>
          <div class="form-field">
            <select class="form-control" id="eventtype" name="eventtype">
              <option value="DLV">Delivery</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Comments</div>
          <div class="form-field">
            <textarea class="form-control" id="comments" name="comments" rows="3"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Name of Signatory</div>
          <div class="form-field">
            <input type="text" class="form-control" id="contact" name="contact">
          </div>
        </div>

        <div class="form-row">
          <div class="form-label">Event date</div>
          <div class="form-field">
            <div class="datetime-group">
              <button type="button" class="icon-btn"><i class="fas fa-calendar-alt"></i></button>
              <input type="text" id="eventdate" name="eventdate" placeholder="YYYY-MM-DD">
              <input type="text" id="eventtime" name="eventtime" placeholder="HH:MM">
              <button type="button" class="icon-btn"><i class="fas fa-clock"></i></button>
            </div>
          </div>
        </div>

        <input type="hidden" name="gmtOffset" id="gmtOffset">
        <input type="hidden" name="_csrf" value="">
      </div>

      <!-- Attachment upload -->
      <div class="panel-attach">
        <h6 style="font-weight:600;margin-bottom:10px;">Join attachment(s) to the event</h6>
        <div class="attachment-zone" id="attachmentDropzone">
          <p>Drop files here or click to upload</p>
          <div style="font-size:48px;color:#1a2332;"><i class="fas fa-paperclip"></i></div>
          <input type="file" id="fileInput" name="file" multiple accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx,.csv,.tsv,.ppt,.pptx,.pages,.odt,.rtf" style="display:none;">
        </div>
        <div class="file-list" id="fileList"></div>
      </div>
    </div>

    <!-- Action buttons -->
    <div class="action-bar">
      <button type="button" class="btn-cancel" onclick="window.location.href='/multiEventStep1.do'">Cancel</button>
      <button type="submit" class="btn-submit" id="createMultiEventsButton">Submit Event</button>
    </div>
  </form>

  <!-- Logout Dialog -->
  <div class="modal-overlay" id="logoutModal">
    <div class="modal-dialog">
      <p>Are you sure you want to log out?</p>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="hideLogoutDialog()">No</button>
        <button class="btn-submit" onclick="window.location.href='/auth/logout'">Yes</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
  <script>
    // Load selected refs from session or API
    let refs = [];
    try { refs = JSON.parse(sessionStorage.getItem('multiEventRefs') || '[]'); } catch(e) {}
    if (refs.length === 0) refs = ['SGVA0134084']; // fallback

    document.getElementById('refCount').textContent = refs.length;
    document.getElementById('refList').innerHTML = refs.map(r => `<div class="ref-chip">${r}</div>`).join('');

    // Set date/time
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('eventdate').value = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
    document.getElementById('eventtime').value = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
    const offset = now.getTimezoneOffset();
    document.getElementById('gmtOffset').value = `${offset<=0?'+':'-'}${pad(Math.floor(Math.abs(offset)/60))}:${pad(Math.abs(offset)%60)}`;

    // Date picker
    $(function() { $('#eventdate').datepicker({ format: 'yyyy-mm-dd', autoclose: true, todayHighlight: true }); });

    // File upload
    const uploadedFiles = [];
    document.getElementById('attachmentDropzone').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', function(e) {
      for (const f of e.target.files) {
        if (uploadedFiles.length >= 5) break;
        if (f.size > 5*1024*1024) continue;
        uploadedFiles.push(f);
      }
      renderFiles();
    });

    const dz = document.getElementById('attachmentDropzone');
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.background='#d0e8ff'; });
    dz.addEventListener('dragleave', () => { dz.style.background='#f0f8ff'; });
    dz.addEventListener('drop', e => {
      e.preventDefault(); dz.style.background='#f0f8ff';
      for (const f of e.dataTransfer.files) { if (uploadedFiles.length<5 && f.size<=5*1024*1024) uploadedFiles.push(f); }
      renderFiles();
    });

    function renderFiles() {
      document.getElementById('fileList').innerHTML = uploadedFiles.map((f,i) => `
        <div class="file-item"><i class="fas fa-file"></i><span>${f.name} (${(f.size/1024).toFixed(1)} KB)</span>
        <span class="remove-file" onclick="uploadedFiles.splice(${i},1);renderFiles();"><i class="fas fa-times"></i></span></div>
      `).join('');
    }

    // Submit
    document.getElementById('createMultiEventsForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const fd = new FormData(this);
      refs.forEach(r => fd.append('selectedShipments', r));
      uploadedFiles.forEach(f => fd.append('file', f));

      fetch('/createMultiEvents.do', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(d => { alert('Multi-event created!'); window.location.href='/home.do'; })
        .catch(() => { alert('Multi-event submitted (mock).'); window.location.href='/home.do'; });
    });

    function showLogoutDialog() { document.getElementById('logoutModal').classList.add('active'); }
    function hideLogoutDialog() { document.getElementById('logoutModal').classList.remove('active'); }
  </script>
</body>
</html>
